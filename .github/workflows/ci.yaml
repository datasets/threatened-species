name: CI

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get data
        env:
          IUCNREDLIST_TOKEN: ${{ secrets.IUCNREDLIST_TOKEN }}
        run: make data
      - name: Verify dataset is populated
        run: >-
          .venv/bin/python -c "import pandas as pd;
          df = pd.read_csv('data/threatened-species.csv');
          assert not df.empty, 'Dataset is empty';
          print('Validated', len(df), 'rows')"
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@users.noreply.github.com"
          git add -A .
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore: 🆕 update dataset"
            git push
          fi
  describe:
    runs-on: ubuntu-latest
    needs: [update]
    steps:
      - name: Install frictionless
        run: pip install frictionless
      - name: Describe
        run: frictionless describe https://raw.githubusercontent.com/datasets/threatened-species/main/datapackage.yaml --stats
